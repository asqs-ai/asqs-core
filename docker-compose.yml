services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: asqs-core-postgres
    environment:
      POSTGRES_USER: asqs
      POSTGRES_PASSWORD: asqs
      POSTGRES_DB: asqs
    ports:
      - "5432:5432"
    volumes:
      - asqs-core-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asqs -d asqs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  asqs-core-pgdata:
